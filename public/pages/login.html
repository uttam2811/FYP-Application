<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MATLAB Monitor</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="form auth-form-card">
      <h1>MATLAB Monitor</h1>
      <p class="subtitle">Real-time Simulation Dashboard</p>

      <div id="alert" class="alert"></div>

      <!-- Step 1: Credentials -->
      <form id="loginForm">
        <div class="flex-column">
          <label for="username">Username</label>
        </div>
        <div class="inputForm">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" viewBox="0 0 32 32" height="20" fill="none" aria-hidden="true">
            <path stroke-linecap="round" stroke-width="2" stroke="#151717" d="M16 7c3.866 0 7 3.134 7 7s-3.134 7-7 7-7-3.134-7-7 3.134-7 7-7Z"></path>
            <path stroke-linecap="round" stroke-width="2" stroke="#151717" d="M7 26c1.8-3.2 5.2-5 9-5s7.2 1.8 9 5"></path>
          </svg>
          <input type="text" id="username" class="input" placeholder="Enter your username" required autocomplete="username">
        </div>

        <div class="flex-column">
          <label for="password">Password</label>
        </div>
        <div class="inputForm">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" viewBox="0 0 32 32" height="20" fill="none" aria-hidden="true">
            <path stroke-linecap="round" stroke-width="2" stroke="#151717" d="M10 14V10a6 6 0 0 1 12 0v4"></path>
            <rect width="18" height="12" x="7" y="14" stroke-width="2" stroke="#151717" rx="2"></rect>
            <path stroke-linecap="round" stroke-width="2" stroke="#151717" d="M16 19v2"></path>
          </svg>
          <input type="password" id="password" class="input" placeholder="Enter your password" required autocomplete="current-password">
        </div>

        <button type="submit" class="button-submit" id="loginBtn">Sign In</button>
      </form>

      <!-- Step 2: OTP Verification -->
      <form id="otpForm" style="display:none;">
        <div class="otp-info">
          <div class="otp-icon">📧</div>
          <p>A verification code has been sent to</p>
          <p class="otp-email" id="otpEmail">***@email.com</p>
        </div>

        <div class="flex-column">
          <label for="otpCode">OTP Code</label>
        </div>
        <div class="inputForm">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" viewBox="0 0 24 24" height="20" fill="none" aria-hidden="true">
            <path d="M4 12h16M12 4v16" stroke="#151717" stroke-width="2" stroke-linecap="round"></path>
          </svg>
          <input type="text" id="otpCode" class="input otp-code-input" placeholder="Enter 6-digit OTP" required maxlength="6" pattern="[0-9]{6}" autocomplete="one-time-code" inputmode="numeric">
        </div>

        <button type="submit" class="button-submit" id="verifyBtn">Verify & Sign In</button>

        <div class="otp-actions">
          <button type="button" class="btn-link" id="resendOtp" onclick="resendLoginOTP()">Resend OTP</button>
          <span class="separator">•</span>
          <button type="button" class="btn-link" onclick="backToLogin()">Back to Login</button>
        </div>

        <div id="otpTimer" class="otp-timer">Code expires in <span id="countdown">5:00</span></div>
      </form>

      <div class="register-link" id="registerLink">
        <p class="p">Don't have an account? <a class="span" href="/register">Create one</a></p>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    let currentUsername = '';
    let countdownInterval = null;

    function setActionButtonText(button, text) {
      button.textContent = text;
    }

    // If already logged in, redirect
    (async () => {
      const user = await Auth.check();
      if (user) window.location.href = '/dashboard';
    })();

    // Step 1: Submit credentials
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alert = document.getElementById('alert');
      const btn = document.getElementById('loginBtn');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      alert.className = 'alert';
      alert.style.display = 'none';
      btn.disabled = true;
      setActionButtonText(btn, 'Verifying...');

      try {
        const res = await API.post('/api/auth/login', { username, password });

        if (res.requireOTP) {
          // Show OTP form
          currentUsername = username;
          document.getElementById('loginForm').style.display = 'none';
          document.getElementById('registerLink').style.display = 'none';
          document.getElementById('otpForm').style.display = 'block';
          document.getElementById('otpEmail').textContent = res.email;
          document.getElementById('otpCode').value = '';
          document.getElementById('otpCode').focus();
          startCountdown();

          alert.className = 'alert alert-success';
          alert.textContent = 'OTP sent to your email!';
          alert.style.display = 'block';
        } else {
          // Direct login (fallback)
          alert.className = 'alert alert-success';
          alert.textContent = 'Login successful! Redirecting...';
          alert.style.display = 'block';
          setTimeout(() => window.location.href = '/dashboard', 500);
        }
      } catch (err) {
        alert.className = 'alert alert-error';
        alert.textContent = err.message;
        alert.style.display = 'block';
      } finally {
        btn.disabled = false;
        setActionButtonText(btn, 'Sign In');
      }
    });

    // Step 2: Verify OTP
    document.getElementById('otpForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alert = document.getElementById('alert');
      const btn = document.getElementById('verifyBtn');
      const otp = document.getElementById('otpCode').value.trim();

      if (otp.length !== 6) {
        alert.className = 'alert alert-error';
        alert.textContent = 'Please enter a valid 6-digit OTP';
        alert.style.display = 'block';
        return;
      }

      alert.className = 'alert';
      alert.style.display = 'none';
      btn.disabled = true;
      setActionButtonText(btn, 'Verifying OTP...');

      try {
        await API.post('/api/auth/verify-login', { username: currentUsername, otp });
        clearInterval(countdownInterval);
        alert.className = 'alert alert-success';
        alert.textContent = 'Login successful! Redirecting...';
        alert.style.display = 'block';
        setTimeout(() => window.location.href = '/dashboard', 500);
      } catch (err) {
        alert.className = 'alert alert-error';
        alert.textContent = err.message;
        alert.style.display = 'block';
        btn.disabled = false;
        setActionButtonText(btn, 'Verify & Sign In');
      }
    });

    // Resend OTP
    async function resendLoginOTP() {
      const alert = document.getElementById('alert');
      const resendBtn = document.getElementById('resendOtp');
      resendBtn.disabled = true;
      resendBtn.textContent = 'Sending...';

      try {
        await API.post('/api/auth/resend-otp', { username: currentUsername, purpose: 'login' });
        alert.className = 'alert alert-success';
        alert.textContent = 'New OTP sent to your email!';
        alert.style.display = 'block';
        startCountdown();
      } catch (err) {
        alert.className = 'alert alert-error';
        alert.textContent = err.message;
        alert.style.display = 'block';
      } finally {
        resendBtn.disabled = false;
        resendBtn.textContent = 'Resend OTP';
      }
    }

    // Back to login form
    function backToLogin() {
      clearInterval(countdownInterval);
      document.getElementById('otpForm').style.display = 'none';
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerLink').style.display = 'block';
      document.getElementById('alert').style.display = 'none';
      currentUsername = '';
    }

    // Countdown timer
    function startCountdown() {
      clearInterval(countdownInterval);
      let timeLeft = 5 * 60; // 5 minutes
      const timerEl = document.getElementById('countdown');

      countdownInterval = setInterval(() => {
        timeLeft--;
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

        if (timeLeft <= 0) {
          clearInterval(countdownInterval);
          timerEl.textContent = 'Expired';
          document.getElementById('otpTimer').style.color = 'var(--danger)';
        }
      }, 1000);
    }
  </script>
  <script src="/js/particles.js"></script>
</body>
</html>
