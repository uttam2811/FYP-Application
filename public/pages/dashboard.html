<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="dashboard-page">
  <div class="beams-bg"></div>



  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>� Dashboard</h2>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Navigation</div>
          <a href="/dashboard" class="nav-link active">
            <span class="icon">📊</span> Dashboard
          </a>
          <a href="/admin" class="nav-link" id="adminLink" style="display:none;">
            <span class="icon">⚙️</span> Admin Panel
          </a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">?</div>
          <div class="user-details">
            <div class="name" id="userName">Loading...</div>
            <div class="role" id="userRole">—</div>
          </div>
        </div>
        <button class="btn btn-outline btn-sm" style="width:100%;margin-top:8px;" onclick="Auth.logout()">
          Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-header">
        <div class="dashboard-header-meta">
          <p class="dashboard-eyebrow">Overview</p>
          <h1>Dashboard</h1>
        </div>
        <div class="header-actions">
          <span class="dashboard-chip" id="todayChip">Welcome</span>
        </div>
      </header>

      <div class="page-content">
        <!-- Stats -->
        <div class="stats-grid">
          <div class="stat-card stat-card-compact glow-cyan">
            <div class="stat-icon blue">�</div>
            <div class="stat-value" id="statUsers">0</div>
            <div class="stat-label">Total Users</div>
            <div class="stat-shimmer"></div>
          </div>
          <div class="stat-card stat-card-compact glow-magenta">
            <div class="stat-icon green">🛡️</div>
            <div class="stat-value" id="statAdmins">0</div>
            <div class="stat-label">Admins</div>
            <div class="stat-shimmer"></div>
          </div>
          <div class="stat-card stat-card-compact glow-lime">
            <div class="stat-icon amber">👁️</div>
            <div class="stat-value" id="statViewers">0</div>
            <div class="stat-label">Viewers</div>
            <div class="stat-shimmer"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Initialize
    (async () => {
      const user = await Auth.check();
      if (!user) return window.location.href = '/login';

      // Update sidebar
      document.getElementById('userName').textContent = user.username;
      document.getElementById('userRole').textContent = user.role;
      document.getElementById('userAvatar').textContent = user.username[0].toUpperCase();
      if (user.role === 'admin') {
        document.getElementById('adminLink').style.display = '';
      }

      // Load stats
      loadStats();
    })();

    async function loadStats() {
      try {
        const data = await API.get('/api/admin/stats');
        document.getElementById('statUsers').textContent = data.totalUsers;
        document.getElementById('statAdmins').textContent = data.adminCount;
        document.getElementById('statViewers').textContent = data.viewerCount;
      } catch (err) {
        console.error('Failed to load stats:', err);
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="/js/particles.js?v=4"></script>
</body>
</html>
